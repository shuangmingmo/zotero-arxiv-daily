name: Send emails daily

on:
  workflow_dispatch:
  schedule:
    - cron: '17 22 * * *'

concurrency:
  group: zotero-arxiv-daily
  cancel-in-progress: false

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.REF }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run script
        shell: bash
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          printf "%b\n" "$CUSTOM_CONFIG" > config/custom.yaml

          echo "Use custom config:"
          cat config/custom.yaml

          for attempt in 1 2 3; do
            echo "Run attempt $attempt/3"

            if uv run src/zotero_arxiv_daily/main.py; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 600))
            fi
          done

          exit 1
